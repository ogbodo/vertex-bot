# Vertex v2 — non-secret config. Secrets live in .env (git-ignored); see .env.example.
# Robustness-first systematic bot. Distinct magic (8800333) from v1 so they never collide.

magic: 8800333

# ── GOLD-ONLY pivot ("one blade, full radar") ─────────────────────────────────
# TRADE universe = gold alone. But a gold bot that only SEES gold is blind to the
# global risk-off cascades that hurt it most — so the multi-asset panel below
# (`context:`) is kept as a RADAR: it feeds the regime/stress layer only and is
# NEVER traded. Signals+sizing on gold; awareness from the whole market.
universe:
  commodities:
    - {proxy: "GC=F", exness: "XAUUSDm", note: "gold — the single traded instrument"}

# Radar-only instruments (regime/stress inputs; never traded, never sized).
context:
  - "^GSPC"
  - "^NDX"
  - "^GDAXI"
  - "^FTSE"
  - "^FCHI"
  - "^STOXX50E"
  - "^N225"
  - "^HSI"
  - "^AXJO"
  - "^NSEI"
  - "IEF"
  - "TLT"
  - "BWX"
  - "EURUSD=X"
  - "GBPUSD=X"
  - "USDJPY=X"
  - "AUDUSD=X"
  - "BTC-USD"
  - "ETH-USD"

# Pre-registered risk parameters (robustness-first dial — see plan). NOT fitted.
risk:
  vol_target: 0.10          # portfolio annualized vol target
  dd_throttle_floor: 0.15   # gross scales 100%->floor as trailing DD goes 0 -> -15%
  kill_switch_dd: 0.20      # flatten the systematic book at -20% from peak
  crypto_bloc_cap: 0.15     # crypto bloc max share of portfolio risk
  corr_floor: 0.30          # never assume pairwise corr below this when forecasting vol

# Sleeve risk budgets (fixed, PRE-REGISTERED before the gold-only validation ran —
# NOT optimized). xsect needs a cross-section to rank, so it's out for a single
# instrument; fast_trend's weight is higher than the old 25% because with one asset
# there is no cross-sectional diversification and shock-reactivity must carry more.
sleeves:
  slow_trend: 0.60
  fast_trend: 0.40

# WEEKLY cadence. Monthly was right for a 20-instrument diversified book, but the fast
# sleeve runs 10-40d signals — holding them 21 days made "fast" stale by construction
# (audit/design fix). Tested 21/10/5d at 2 and 6 bps: monotone improvement toward 5d,
# robust to 3x cost. All six runs counted in the deflated-Sharpe trial tally.
rebalance_days: 5

# Broker: Exness. Only the traded instrument needs a mapping (context is never traded).
#   • Standard / Standard-demo accounts: gold = "XAUUSDm" (0.01 lot = 1 oz ≈ $3k+ notional —
#     too coarse for a ~$100 account; fine from a few $k).
#   • Standard CENT account (the $100 route): gold = "XAUUSDc" — cent-account contracts are
#     ~100× smaller (1 cent-lot = 1,000 units), so the minimum gold position is tens of
#     dollars of exposure instead of thousands. The EA reads the live contract size, so
#     switching accounts is JUST this symbol string (confirm the exact name in Market Watch).
#   • Pair with Exness swap-free (Extended covers XAUUSD): zero overnight fees on gold —
#     removes the biggest cost drag on a hold-weeks trend book (activity-based, can downgrade).
broker: "Exness"
broker_symbols:
  "GC=F": "XAUUSDm"   # change to "XAUUSDc" on a Standard Cent account

execution:
  # The MT5 terminal's MQL5/Files folder — where VertexPlacerV2 reads the .reb book + risk
  # directive. Shared with v1's files, but names (vxq_v2_*) and magic (8800333) are distinct.
  queue_dir: "/Users/izuchukwuogbodo/Library/Application Support/net.metaquotes.wine.metatrader5/drive_c/Program Files/MetaTrader 5/MQL5/Files"
  demo_balance_fallback: 100   # the design target: a ~$100 (cent) account must operate
  magic: 8800333        # isolated from v1 (8800111/8800222) — v2 can never touch v1 positions
